name: ブログ自動更新

on:
  schedule:
    # 毎時間0分に実行（UTC）
    - cron: '0 * * * *'
  workflow_dispatch:

# pushに必要な書き込み権限を付与
permissions:
  contents: write

jobs:
  update-blog:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 依存ライブラリのインストール
        run: pip install requests jinja2

      - name: ブログ更新スクリプトを実行
        run: python scripts/update.py

      - name: 更新ファイルをコミット＆プッシュ
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html data/products.json
          git diff --staged --quiet || git commit -m "🤖 自動更新: $(date +'%Y-%m-%d %H:%M') UTC"
          git push
