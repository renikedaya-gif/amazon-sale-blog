[amazon]
# Amazon PA API の認証情報（取得後に入力してください）
access_key = YOUR_ACCESS_KEY
secret_key = YOUR_SECRET_KEY
partner_tag = salematome0d-22

[settings]
# デモモード: true=サンプルデータ使用, false=Amazon PA API使用
demo_mode = true

# 更新間隔（分単位）
update_interval_minutes = 60

# 取得する最大商品数（ジャンルごと）
max_items_per_category = 10

# 最低割引率（%）
min_discount_rate = 10

[blog]
# ブログのタイトル
title = Amazon お買い得情報まとめ
# サブタイトル
subtitle = リアルタイム更新！今日のセール・割引商品を厳選紹介

[output]
# 出力ファイルパス
html_file = index.html
data_file = data/products.json
